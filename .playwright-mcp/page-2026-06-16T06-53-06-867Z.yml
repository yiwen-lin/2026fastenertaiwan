  - generic [ref=e26]:
    - heading "2026 Global Fastener Forum" [level=2] [ref=e27]
    - generic [ref=e28]:
      - heading "As AI Healthcare Enters the Era of Commercialization, How Can Taiwan Expand Globally?" [level=3] [ref=e29]
      - paragraph [ref=e31]:
        - text: AI is rapidly transforming global healthcare, from clinical applications to market expansion, making smart healthcare a major driver of health technology growth.
        - text: The 2026 Global Summit on AI-Enabled Healthcare Strategy brings together international medical, technology, and industry leaders to discuss AI healthcare commercialization, clinical validation, data applications, and global market opportunities.
        - text: The summit aims to explore practical strategies for connecting Taiwan’s smart healthcare strengths with international markets and creating new industry value.
