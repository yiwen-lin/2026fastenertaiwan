  - heading "Global Fastener Forum 2026 年全球扣件產業論壇" [level=1] [ref=e24]
  - generic [ref=e26]:
    - heading "2026 年全球扣件產業論壇" [level=2] [ref=e27]
    - generic [ref=e28]:
      - heading "AI醫療進入變現時代，臺灣如何走向國際？" [level=3] [ref=e29]
      - paragraph [ref=e31]:
        - text: AI正快速改變全球醫療產業，從臨床應用、流程優化到國際市場拓展，智慧醫療已成為大健康產業的重要成長動能。
        - text: 「2026全球AI智慧醫療戰略高峰會」聚焦AI醫療的商業化與國際化發展，邀集國際醫療機構、科技企業及臺灣產業領袖，共同探討醫療資料應用、臨床驗證、國際布局與市場機會。
        - text: 透過跨界交流與實務分享，攜手探索臺灣智慧醫療接軌全球、開創產業新價值的關鍵策略。
  - generic [ref=e33]:
    - heading "活動 3 大亮點" [level=2] [ref=e34]
    - generic [ref=e35]:
      - generic [ref=e36]:
        - generic [ref=e37]: 國際視野
        - heading "掌握AI醫療全球趨勢" [level=3] [ref=e38]
        - paragraph [ref=e39]: 邀請美國麻省總醫院新創中心與GE HealthCare國際專家，從跨境驗證、臨床導入到商業應用，解析AI醫療如何在全球市場中加速落地。
      - generic [ref=e41]:
        - generic [ref=e42]: 產業戰略
        - heading "看見臺灣大健康新商機" [level=3] [ref=e43]
        - paragraph [ref=e44]: 從醫院資料、AI大數據到健康科技應用，探討臺灣如何將臨床能量與產業資源轉化為可擴張、可輸出的國際競爭力。
      - generic [ref=e46]:
        - generic [ref=e47]: 市場突圍
        - heading "串聯驗證、通路與國際布局" [level=3] [ref=e48]
        - paragraph [ref=e49]: 聚焦智慧醫療企業最關鍵的出海課題，從臨床驗證、法規與國際市場進入策略，思考臺灣AI醫療如何走向全球。
